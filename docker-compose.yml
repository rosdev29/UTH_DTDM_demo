services:
  app-blue:
    image: nginx:alpine
    container_name: app-blue
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ./app-content/blue/index.html:/usr/share/nginx/html/index.html:ro
    networks:
      - app_net

  app-green:
    image: nginx:alpine
    container_name: app-green
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ./app-content/green/index.html:/usr/share/nginx/html/index.html:ro
    networks:
      - app_net

  nginx:
    image: nginx:alpine
    container_name: edge-nginx
    restart: unless-stopped
    depends_on:
      - app-blue
      - app-green
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - app_net

networks:
  app_net:
    driver: bridge
