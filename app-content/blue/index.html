<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BLUE Environment</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b3d91;
      color: #ffffff;
    }
    .card {
      text-align: center;
      background: rgba(255, 255, 255, 0.12);
      border: 2px solid rgba(255, 255, 255, 0.35);
      border-radius: 14px;
      padding: 32px 40px;
      max-width: 540px;
    }
    .badge {
      display: inline-block;
      font-size: 42px;
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">BLUE</div>
    <h1>Blue environment is serving traffic</h1>
    <p>Blue-Green demo page</p>
  </div>
</body>
</html>
